<div class="chats-page">
  <app-new-chat-dialog
    [visible]="showNewChatDialog()"
    (cancel)="onNewChatDialogCancel()"
    (conversationCreated)="onConversationCreated($event)"
  ></app-new-chat-dialog>

  <!-- Left Panel: Chat List -->
  <div class="chat-list-panel">
    <app-chat-list
      (newChatClicked)="onNewChat()"
    ></app-chat-list>
  </div>
  
  <!-- Middle Panel: Chat View -->
  <div class="chat-view-panel">
    <app-chat
      [conversation]="getChatConversation()"
      (sendMessage)="onSendMessage($event)"
    ></app-chat>
  </div>
  
  <!-- Right Panel: Details -->
  <div class="details-panel">
    <app-chat-details
      [conversation]="getConversationDetails()"
    ></app-chat-details>
  </div>
</div>
