<a 
  [routerLink]="routerLink" 
  class="nav-item" 
  [class.active]="isActive"
  [title]="isExpanded ? '' : label"
>
  <div class="icon-wrapper">
    <span class="pi" [ngClass]="icon"></span>
    @if(badge > 0) {
      <span class="badge">{{ badge }}</span>
    }
  </div>
  @if(isExpanded){
    <span class="nav-label">{{ label }}</span>
  }
</a>
